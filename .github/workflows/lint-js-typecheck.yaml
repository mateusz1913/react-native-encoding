name: JS lint and typecheck

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lint-js-typecheck.yaml"
      - "js-tests/**"
      - "scripts/*.[tj]s"
      - "src/**"
      - ".prettierrc"
      - "eslint.config.mjs"
      - "jest.config.js"
      - "package.json"
      - "react-native.config.js"
      - "tsconfig.json"
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  lint-js-typecheck:
    name: JS lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0

      - name: Setup JS
        uses: ./.github/actions/setup-js
        with:
          enable-cache: true

      - name: Run ESLint
        run: yarn lint:js
        shell: bash

      - name: Run TypeScript
        run: yarn typecheck
        shell: bash
