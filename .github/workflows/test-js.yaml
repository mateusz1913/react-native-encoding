name: Test JS

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/test-js.yaml"
      - "src/**"
      - "tests-datasets/dataset.json"
      - "jest.config.js"
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test-js:
    name: Run Jest suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0

      - name: Setup JS
        uses: ./.github/actions/setup-js
        with:
          enable-cache: true

      - name: Run Jest
        run: yarn test:js
        shell: bash
